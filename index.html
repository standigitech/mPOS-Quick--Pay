<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngash Quick Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Ngash Payment</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Customer Phone</label>
                <input id="phone" type="text" placeholder="2547XXXXXXXX" class="mt-1 block w-full border border-gray-300 rounded-md p-3 shadow-sm focus:ring-green-500 focus:border-green-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Amount (KES)</label>
                <input id="amount" type="number" placeholder="e.g. 300" class="mt-1 block w-full border border-gray-300 rounded-md p-3 shadow-sm focus:ring-green-500 focus:border-green-500">
            </div>

            <button onclick="sendPrompt()" id="payBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition duration-300">
                Send M-Pesa Prompt
            </button>
            
            <p id="status" class="text-center text-sm font-semibold mt-4"></p>
        </div>
    </div>

    <script>
        async function sendPrompt() {
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('payBtn');

            status.innerText = "Processing... 🔄";
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/stkpush', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, amount })
                });

                const data = await response.json();
                if (data.ResponseCode === "0") {
                    status.innerText = "✅ Prompt sent to customer!";
                    status.className = "text-center text-green-600 font-bold mt-4";
                } else {
                    status.innerText = "❌ Error: " + data.CustomerMessage;
                    status.className = "text-center text-red-600 font-bold mt-4";
                }
            } catch (err) {
                status.innerText = "❌ Connection failed!";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
